syntax = "proto3";

package user;

service UserService {
  rpc GetUserProfile (GetUserProfileRequest) returns (GetUserProfileResponse);
  rpc GetRole        (GetRoleRequest)        returns (GetRoleResponse);
  rpc SetUserRole    (SetUserRoleRequest)    returns (SetUserRoleResponse);
  rpc GetUsersByIds  (GetUsersByIdsRequest)  returns (GetUsersByIdsResponse);
}

message GetUserProfileRequest  {}
message GetUserProfileResponse { string name = 1; string avatarUrl = 2; }

message GetRoleRequest         {}
message GetRoleResponse        { string role = 1; }

message SetUserRoleRequest     { string userId = 1; string role = 2; }
message SetUserRoleResponse    { bool success = 1; string role = 2; }

message GetUsersByIdsRequest {
  repeated string userIds = 1;
}

message GetUsersByIdsResponse {
  repeated UserSummary users = 1;
}

message UserSummary {
  string id = 1;
  string name = 2;
  string avatarUrl = 3;
}
