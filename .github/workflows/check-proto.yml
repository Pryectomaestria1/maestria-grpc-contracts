name: Check Proto Contract

on:
  pull_request:
    paths:
      - 'media.proto'
      - 'index.ts'
      - 'scripts/**'
      - 'test/**'
      - 'package.json'
      - '.github/workflows/check-proto.yml'
  push:
    branches: [main, develop]

jobs:
  check-proto:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run proto contract check
        run: npm run check:proto
